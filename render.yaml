services:
  - type: web
    name: bhavana-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          type: web
          name: bhavana-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      # IMPORTANT: Set SMTP_USER and SMTP_PASS in Render Dashboard manually (never commit secrets to yaml!)

  - type: web
    name: bhavana-frontend
    env: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: bhavana-backend
          envVarKey: RENDER_EXTERNAL_URL
